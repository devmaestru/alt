<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUCKED BY RBX</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Syncopate', sans-serif;
        }

        .container {
            width: 90vw;
            text-align: center;
        }

        h1 {
            color: #fff;
            font-size: clamp(1rem, 3.5vw, 2.5rem);
            font-weight: 700;
            text-transform: uppercase;
            white-space: nowrap;
            letter-spacing: 0.3em;
            animation: reveal 2.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            opacity: 0;
            will-change: transform, letter-spacing, opacity;
        }

        @keyframes reveal {
            0% { 
                opacity: 0; 
                transform: scale(1.1);
                letter-spacing: 1.5em; 
                filter: blur(15px);
            }
            100% { 
                opacity: 1; 
                transform: scale(1);
                letter-spacing: 0.3em;
                filter: blur(0);
            }
        }

        .line {
            height: 1px;
            background: linear-gradient(90deg, transparent, #fff, transparent);
            width: 0;
            margin: 20px auto 0;
            animation: lineExpand 2s cubic-bezier(0.19, 1, 0.22, 1) forwards 1s;
        }

        @keyframes lineExpand {
            to { width: 100%; opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>FUCKED BY RBX</h1>
        <div class="line"></div>
    </div>

</body>
</html>
